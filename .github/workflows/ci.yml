name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: workspace check
        run: |
          test -f Cargo.toml && echo "workspace cargo manifest present"
          test -f Anchor.toml && echo "anchor manifest present"
          test -d programs/oilship && echo "anchor program present"
          test -d watch && echo "watch engine present"
          test -f rust-toolchain.toml && echo "toolchain pinned"

  sdk:
    name: sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk
    steps:
      - uses: actions/checkout@v6
      - name: workspace check
        run: |
          test -f package.json && echo "sdk package.json present"
          test -d src && echo "sdk source present"
          test -f tsconfig.json && echo "tsconfig present"

  cli:
    name: cli
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli
    steps:
      - uses: actions/checkout@v6
      - name: workspace check
        run: |
          test -f pyproject.toml && echo "cli pyproject.toml present"

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: docs check
        run: |
          test -f README.md && echo "readme present"
          test -f docs/architecture.md && echo "architecture doc present"
          test -f LICENSE && echo "license present"
          test -f CONTRIBUTING.md && echo "contributing present"
          test -f CHANGELOG.md && echo "changelog present"
          test -f SECURITY.md && echo "security policy present"
          test -f CODE_OF_CONDUCT.md && echo "code of conduct present"

  community:
    name: community
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: community files check
        run: |
          test -f .github/CODEOWNERS && echo "codeowners present"
          test -f .github/dependabot.yml && echo "dependabot present"
          test -f .github/FUNDING.yml && echo "funding present"
          test -f .github/PULL_REQUEST_TEMPLATE.md && echo "pr template present"
          test -d .github/ISSUE_TEMPLATE && echo "issue templates present"
